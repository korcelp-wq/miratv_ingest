<!DOCTYPE html>
<html>
<head>
    <title>MiraTV PowerShell Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', monospace; background: #0a0c10; color: #e6edf3; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        button { background: #2f81f7; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; }
        input, textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 10px; margin: 5px 0; }
        .result { background: #0d1117; padding: 15px; border-radius: 6px; white-space: pre-wrap; font-family: monospace; }
        .log { color: #8b949e; font-size: 12px; margin-top: 10px; }
        .success { color: #3fb950; }
        .error { color: #f85149; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 MiraTV PowerShell Dashboard</h1>
        
        <div class="panel">
            <h3>Quick Actions</h3>
            <button onclick="runPs('Get-WorkingMemory')">📋 Working Memory</button>
            <button onclick="runPs('Get-AiLearnings')">🧠 AI Learnings</button>
            <button onclick="runPs('Get-Procedures')">📚 Procedures</button>
            <button onclick="runPs('Get-Failures')">❌ Failures</button>
        </div>

        <div class="panel">
            <h3>Custom PowerShell Command</h3>
            <input type="text" id="psCommand" placeholder="Enter PowerShell command..." value=".\Query.ps1 -Sql &quot;SELECT * FROM pcde_working_memory&quot;">
            <button onclick="runCustomPs()">▶ Run</button>
        </div>

        <div class="panel">
            <h3>Result</h3>
            <pre id="result" class="result">Ready...</pre>
        </div>

        <div class="log" id="log"></div>
    </div>

    <script>
        function addLog(msg, type = 'info') {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            log.innerHTML = `[${time}] ${msg}<br>` + log.innerHTML;
        }

        async function runPs(command) {
            const cmdMap = {
                'Get-WorkingMemory': '.\Query.ps1 -Sql "SELECT * FROM pcde_working_memory ORDER BY created_at DESC"',
                'Get-AiLearnings': '.\Query.ps1 -Sql "SELECT * FROM pcde_ai_memory ORDER BY confidence DESC"',
                'Get-Procedures': '.\Query.ps1 -Sql "SELECT procedure_id, procedure_name, domain FROM pcde_procedure_registry"',
                'Get-Failures': '.\Query.ps1 -Sql "SELECT * FROM pcde_procedure_failure ORDER BY last_error_at DESC LIMIT 10"'
            };
            
            const cmd = cmdMap[command] || command;
            document.getElementById('psCommand').value = cmd;
            await runCustomPs(cmd);
        }

        async function runCustomPs(cmd) {
            const command = cmd || document.getElementById('psCommand').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.textContent = 'Running...';
            addLog(`Executing: ${command}`, 'info');
            
            try {
                // Call a local PHP proxy that executes PowerShell
                const response = await fetch('/run_ps.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: command })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.textContent = data.output;
                    addLog('✅ Command succeeded', 'success');
                } else {
                    resultDiv.textContent = `Error: ${data.error}`;
                    addLog(`❌ ${data.error}`, 'error');
                }
            } catch (error) {
                resultDiv.textContent = `Error: ${error.message}`;
                addLog(`❌ ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
