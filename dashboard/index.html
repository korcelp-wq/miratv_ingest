<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiraTV Master Control Dashboard</title>
    <style>
        /* ... (same styles as before) ... */
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">
                🎮 MiraTV Master Control Dashboard 
                <span id="configStatus">Loading config...</span>
            </div>
            <div class="status">
                <div class="status-badge" id="connectionStatus">🔌 Connecting...</div>
                <div class="token-display" id="tokenDisplay">Token: ••••••••</div>
            </div>
        </div>

        <div class="main-panel">
            <!-- Left Panel: Query Interface -->
            <div class="panel">
                <div class="panel-header">
                    <span>🔍 CVI Query Interface</span>
                    <span id="endpointDisplay"></span>
                </div>
                
                <div class="db-selector" id="dbSelector">
                    <!-- Populated by config -->
                </div>
                
                <textarea id="sqlInput" class="query-area" placeholder="Enter SQL query with ? placeholders..."></textarea>
                <textarea id="paramsInput" class="params-area" placeholder='Parameters array (JSON format)'>[]</textarea>
                
                <div class="button-group">
                    <button id="executeBtn" class="primary-button">🚀 Execute via CVI</button>
                    <button id="clearBtn" class="secondary-button">Clear Results</button>
                    <button id="formatBtn" class="secondary-button">Format SQL</button>
                    <button id="reloadConfigBtn" class="secondary-button">🔄 Reload Config</button>
                </div>
                
                <div class="quick-actions" id="quickActions">
                    <!-- Populated by config -->
                </div>
            </div>
            
            <!-- Right Panel: Results -->
            <div class="panel">
                <div class="panel-header">
                    <span>📊 Query Results</span>
                    <span id="resultMeta"></span>
                </div>
                
                <pre id="resultsArea" class="results-area">{
  "message": "Loading configuration...",
  "status": "waiting"
}</pre>
                
                <div class="button-group">
                    <button id="copyBtn" class="secondary-button">📋 Copy Results</button>
                    <button id="saveLearningBtn" class="secondary-button">💾 Save as Learning</button>
                    <button id="checkGovernanceBtn" class="secondary-button">⚖️ Check Governance</button>
                </div>
            </div>
        </div>
        
        <!-- Bottom Panel: Activity Log -->
        <div class="panel">
            <div class="panel-header">
                <span>📝 Activity Log</span>
                <span id="logCount">0 entries</span>
            </div>
            <div id="logArea" class="log-area"></div>
        </div>
    </div>

    <script>
        // State
        let config = null;
        let currentDb = null;
        let currentResults = null;
        let logEntries = [];
        
        // DOM Elements
        const elements = {
            sqlInput: document.getElementById('sqlInput'),
            paramsInput: document.getElementById('paramsInput'),
            resultsArea: document.getElementById('resultsArea'),
            logArea: document.getElementById('logArea'),
            resultMeta: document.getElementById('resultMeta'),
            logCount: document.getElementById('logCount'),
            dbSelector: document.getElementById('dbSelector'),
            quickActions: document.getElementById('quickActions'),
            endpointDisplay: document.getElementById('endpointDisplay'),
            tokenDisplay: document.getElementById('tokenDisplay'),
            connectionStatus: document.getElementById('connectionStatus'),
            configStatus: document.getElementById('configStatus')
        };
        
        // Load configuration
        async function loadConfig() {
            try {
                const response = await fetch('config.json');
                config = await response.json();
                
                // Update UI with config
                elements.endpointDisplay.textContent = config.cvi_endpoint;
                elements.tokenDisplay.textContent = 'Token: ••••••••';
                elements.connectionStatus.textContent = '🔌 Connected to CVI';
                elements.configStatus.textContent = 'Config loaded';
                
                // Set default database
                currentDb = config.default_db;
                
                // Populate database selector
                renderDbSelector();
                
                // Populate quick actions
                renderQuickActions();
                
                // Set example query
                if (config.quick_actions && config.quick_actions.length > 0) {
                    elements.sqlInput.value = config.quick_actions[0].sql;
                }
                
                addLog('✅ Configuration loaded successfully', 'success');
                
            } catch (error) {
                elements.configStatus.textContent = '⚠️ Config not found';
                elements.connectionStatus.textContent = '❌ No config';
                elements.resultsArea.textContent = JSON.stringify({
                    error: 'Could not load config.json',
                    message: 'Please create config.json in the same directory as this dashboard',
                    example: {
                        cvi_endpoint: '/cvi',
                        token: 'WYWIQAB5ICKL2VUW9PW98IYF2JMNF9XY',
                        default_db: 'xpdgxfsp_pcde_memory'
                    }
                }, null, 2);
                addLog('❌ Failed to load config.json', 'error');
            }
        }
        
        // Render database selector
        function renderDbSelector() {
            if (!config || !config.databases) return;
            
            let html = '';
            config.databases.forEach(db => {
                const active = db === currentDb ? 'active' : '';
                html += `<button class="db-button ${active}" data-db="${db}">${db}</button>`;
            });
            
            elements.dbSelector.innerHTML = html;
            
            // Add event listeners
            document.querySelectorAll('.db-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.db-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDb = btn.dataset.db;
                    addLog(`Switched to database: ${currentDb}`);
                });
            });
        }
        
        // Render quick actions
        function renderQuickActions() {
            if (!config || !config.quick_actions) return;
            
            let html = '';
            config.quick_actions.forEach((action, index) => {
                html += `
                    <div class="action-card" data-action-index="${index}">
                        <h3>📋 ${action.name}</h3>
                        <p>${action.sql.substring(0, 50)}...</p>
                    </div>
                `;
            });
            
            elements.quickActions.innerHTML = html;
            
            // Add event listeners
            document.querySelectorAll('.action-card').forEach(card => {
                card.addEventListener('click', () => {
                    const index = card.dataset.actionIndex;
                    const action = config.quick_actions[index];
                    elements.sqlInput.value = action.sql;
                    elements.paramsInput.value = JSON.stringify(action.params || []);
                    addLog(`📋 Loaded: ${action.name}`);
                });
            });
        }
        
        // Execute query
        document.getElementById('executeBtn').addEventListener('click', async () => {
            if (!config) {
                addLog('⚠️ No configuration loaded', 'error');
                return;
            }
            
            const sql = elements.sqlInput.value.trim();
            if (!sql) {
                addLog('⚠️ No SQL query entered', 'error');
                return;
            }
            
            let params = [];
            try {
                params = JSON.parse(elements.paramsInput.value || '[]');
                if (!Array.isArray(params)) throw new Error('Params must be an array');
            } catch (e) {
                addLog('❌ Invalid parameters JSON: ' + e.message, 'error');
                return;
            }
            
            addLog(`🔍 Executing on ${currentDb}: ${sql.substring(0, 60)}...`);
            
            try {
                const response = await fetch(config.cvi_endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: config.token,
                        db: currentDb,
                        sql: sql,
                        params: params
                    })
                });
                
                const data = await response.json();
                currentResults = data;
                
                elements.resultsArea.textContent = JSON.stringify(data, null, 2);
                
                const rowCount = data.rows ? data.rows.length : (data.length || 0);
                elements.resultMeta.textContent = `${rowCount} rows returned`;
                
                addLog(`✅ Query executed successfully (${rowCount} rows)`, 'success');
                
            } catch (error) {
                elements.resultsArea.textContent = JSON.stringify({ error: error.message }, null, 2);
                addLog(`❌ Query failed: ${error.message}`, 'error');
            }
        });
        
        // Clear results
        document.getElementById('clearBtn').addEventListener('click', () => {
            elements.resultsArea.textContent = '{}';
            currentResults = null;
            elements.resultMeta.textContent = '';
            addLog('🧹 Results cleared');
        });
        
        // Format SQL
        document.getElementById('formatBtn').addEventListener('click', () => {
            const sql = elements.sqlInput.value;
            const formatted = sql
                .replace(/\bselect\b/gi, 'SELECT')
                .replace(/\bfrom\b/gi, 'FROM')
                .replace(/\bwhere\b/gi, 'WHERE')
                .replace(/\bjoin\b/gi, 'JOIN')
                .replace(/\bleft\b/gi, 'LEFT')
                .replace(/\border by\b/gi, 'ORDER BY')
                .replace(/\blimit\b/gi, 'LIMIT')
                .replace(/\binsert\b/gi, 'INSERT')
                .replace(/\bupdate\b/gi, 'UPDATE')
                .replace(/\bdelete\b/gi, 'DELETE');
            
            elements.sqlInput.value = formatted;
            addLog('✨ SQL formatted');
        });
        
        // Reload config
        document.getElementById('reloadConfigBtn').addEventListener('click', () => {
            loadConfig();
        });
        
        // Copy results
        document.getElementById('copyBtn').addEventListener('click', () => {
            if (!currentResults) {
                addLog('⚠️ No results to copy', 'error');
                return;
            }
            
            navigator.clipboard.writeText(JSON.stringify(currentResults, null, 2));
            addLog('📋 Results copied to clipboard', 'success');
        });
        
        // Save as learning
        document.getElementById('saveLearningBtn').addEventListener('click', async () => {
            if (!config) {
                addLog('⚠️ No configuration', 'error');
                return;
            }
            
            if (!currentResults) {
                addLog('⚠️ No results to save', 'error');
                return;
            }
            
            const insight = prompt('What did you learn from this?', 'Identified pattern in query results');
            if (!insight) return;
            
            const sql = `
                INSERT INTO pcde_ai_memory 
                (agent_name, memory_type, key_data, confidence, created_at)
                VALUES ('human_operator', 'learning', ?, 0.95, NOW())
            `;
            
            try {
                const response = await fetch(config.cvi_endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: config.token,
                        db: 'xpdgxfsp_pcde_memory',
                        sql: sql,
                        params: [insight + '\n\nContext: ' + JSON.stringify(currentResults).substring(0, 200)]
                    })
                });
                
                addLog('💾 Learning saved to pcde_ai_memory', 'success');
                
            } catch (error) {
                addLog(`❌ Failed to save: ${error.message}`, 'error');
            }
        });
        
        // Check governance
        document.getElementById('checkGovernanceBtn').addEventListener('click', async () => {
            if (!config) return;
            
            const action = prompt('What action to check?', 'query_database');
            if (!action) return;
            
            const sql = `
                SELECT r.rule_code, r.severity, e.decision 
                FROM inhibitor_govenor_matrix.igm_rules r
                LEFT JOIN inhibitor_govenor_matrix.igm_rule_evaluations e 
                    ON r.rule_id = e.rule_id 
                    AND e.component_id = 'human_operator'
                    AND e.action_context LIKE ?
                WHERE r.active = 1
                ORDER BY e.evaluated_at DESC
                LIMIT 5
            `;
            
            try {
                const response = await fetch(config.cvi_endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: config.token,
                        db: 'inhibitor_govenor_matrix',
                        sql: sql,
                        params: [`%${action}%`]
                    })
                });
                
                const data = await response.json();
                elements.resultsArea.textContent = JSON.stringify(data, null, 2);
                addLog(`⚖️ Governance check for: ${action}`, 'success');
                
            } catch (error) {
                addLog(`❌ Governance check failed: ${error.message}`, 'error');
            }
        });
        
        // Add log entry
        function addLog(message, type = 'info') {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'log-time';
            timeSpan.textContent = `[${time}]`;
            
            const messageSpan = document.createElement('span');
            messageSpan.textContent = message;
            if (type === 'error') messageSpan.style.color = 'var(--danger)';
            if (type === 'success') messageSpan.style.color = 'var(--success)';
            
            logEntry.appendChild(timeSpan);
            logEntry.appendChild(messageSpan);
            
            elements.logArea.prepend(logEntry);
            
            // Keep only last 50 entries
            logEntries.unshift({ time, message, type });
            if (logEntries.length > 50) logEntries.pop();
            
            elements.logCount.textContent = `${logEntries.length} entries`;
        }
        
        // Initialize
        loadConfig();
    </script>
</body>
</html>
